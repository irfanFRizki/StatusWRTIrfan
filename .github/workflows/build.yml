name: StatusWRT CI/CD

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup scripts
        run: chmod +x scripts/*.sh

      - name: Generate version
        run: |
          VERSION=$(bash scripts/version.sh)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Generate changelog
        run: |
          bash scripts/changelog.sh $VERSION

      - name: Commit version update
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add VERSION CHANGELOG.md
          git commit -m "ci: release $VERSION" || true
          git push

      - name: Build IPK
        run: |
          echo "2.0" > debian-binary
          mkdir -p control

          printf "Package: luci-app-statuswrtirfan\nVersion: $VERSION\nArchitecture: all\nMaintainer: Irfan\nDepends: luci, python3\nDescription: StatusWRT Monitoring\n" > control/control

          tar -czf control.tar.gz control
          tar -czf data.tar.gz usr etc www

          tar -czf luci-app-statuswrtirfan_${VERSION}_all.ipk debian-binary control.tar.gz data.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: StatusWRT v${{ env.VERSION }}
          body_path: CHANGELOG.md
          files: luci-app-statuswrtirfan_${{ env.VERSION }}_all.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
