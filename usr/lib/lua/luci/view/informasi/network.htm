<%#
Template: informasi/network
Network Information
-%>
<%+header%>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<div class="container-fluid px-3">
  <h4 class="mb-3"><i class="bi bi-wifi text-primary"></i> Network</h4>
  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr><th>Interface</th><th>IPv4</th><th>IPv6</th><th>Status</th><th>RX</th><th>TX</th></tr>
          </thead>
          <tbody id="net-table">
            <tr><td colspan="6" class="text-center py-3 text-muted">Memuat...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
function fmtBytes(b){
  if(b>1073741824) return (b/1073741824).toFixed(2)+' GB';
  if(b>1048576) return (b/1048576).toFixed(2)+' MB';
  return (b/1024).toFixed(0)+' KB';
}
fetch('<%=luci.dispatcher.build_url("admin","services","informasi","api")%>?action=network')
  .then(r=>r.json())
  .then(function(d){
    var tb=document.getElementById('net-table');
    var ifaces=d.interfaces||[];
    if(!ifaces.length){tb.innerHTML='<tr><td colspan="6" class="text-center text-muted">Tidak ada interface</td></tr>';return;}
    tb.innerHTML=ifaces.map(function(i){
      var ip4=(i.ipv4_address&&i.ipv4_address[0])?i.ipv4_address[0].address+'/'+i.ipv4_address[0].mask:'—';
      var ip6=(i.ipv6_address&&i.ipv6_address[0])?i.ipv6_address[0].address:'—';
      var st=i.up?'<span class="badge bg-success">Up</span>':'<span class="badge bg-danger">Down</span>';
      var rx=i.statistics?fmtBytes(i.statistics.rx_bytes):'—';
      var tx=i.statistics?fmtBytes(i.statistics.tx_bytes):'—';
      return '<tr><td><b>'+i.interface+'</b></td><td><code>'+ip4+'</code></td><td><code>'+ip6+'</code></td><td>'+st+'</td><td>'+rx+'</td><td>'+tx+'</td></tr>';
    }).join('');
  });
</script>
<%+footer%>
